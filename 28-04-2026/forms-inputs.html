<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Exemplos de formularios</h1>
    </header>
    <main>
        <form action="#" method="get">

            <!-- tipo text -->
            <label for="nome">Nome</label><br>
            <input type="text" name="nome" id="nome" required minlength="3" maxlength="15" placeholder="escreva seu nome... ">

            <br><br>
            
            <!-- CHECKBOX -->
            <input type="checkbox" name="termos" id="termos" >
            <label for="termos">Você concorda com os termos de uso.</label>

            <br><br>

            <!-- tipo color -->
             <label for="cor">Selecione a cor</label><br>
            <input type="color" name="cor" id="cor">

            <br><br>

            <!-- tipo data -->
            <label for="data">Data do evento</label>
            <input type="date" name="data" id="data" min="2026-01-01" max="2026-12-31">

            <br><br>

            <!-- tipo arquivo -->
            <label for="arquivo">Envie sua foto</label>    
            <input type="file" name="arquivo" id="arquivo">

            <br><br>

            <!-- hidden -->
            <input type="hidden" name="escodidin">

            <br><br>

            <!-- password -->
            <label for="senha">Informe sua senha</label>
            <input type="password" name="senha" id="senha">

            <br><br>
            <!-- radio, tem quem manter o mesmo name e mudar o id -->
            <p>CPF ou CNPJ?</p>
            <input type="radio" name="pessoa" id="CPF" value="pf" checked>
            <label for="CPF">CPF</label>
            <input type="radio" name="pessoa" id="CNPJ" value="pj">
            <label for="pessoa">CNPJ</label>
            
            <br><br>

            <!-- number, fica teclado numerico-->
            <label for="idade">Idade:</label>
            <input type="number" name="idade" id="idade" min="0" max="120" value="0" step="5">

            <br><br> 

            <label for="altura">altura</label>
            <input type="number" name="altura" id="altura" min="1" max="2.5" step="0.1">
            
            <br><br>

            <!-- tipo email, fica teclado p/ ajudar o email-->
            <label for="email">E-mail</label>
            <input type="email" name="email" id="email">

            <br><br>

            
            <label for="nota">Escreva sua nota para o forms</label>
            <input type="range" name="nota" id="nota" min="0" max="10" oninput="saida.value = this.value;">
            <output name="saida"></output>



            <button type="submit">Enviar</button>
            
        </form>
    </main>
</body>
</html>
